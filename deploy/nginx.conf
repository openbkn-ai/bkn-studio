# Replaces nginx's stock default.conf server block. Serves the bkn-studio SPA
# under /studio only — the gateway ingress already routes /api, /oauth2,
# /.well-known and /userinfo to bkn-safe, so this server proxies NOTHING.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # k8s probe target — cheap 200, outside /studio so it never collides with
    # the client router.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Bare root → app base, mirroring the dev server's redirect plugin so a user
    # hitting https://host/ lands in the studio shell.
    location = / {
        return 302 /studio/;
    }

    # Vite emits content-hashed filenames under /studio/assets — cache hard.
    location /studio/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached or clients pin a stale asset manifest.
    location = /studio/index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: serve the file if it exists, else hand index.html to the
    # client-side router for deep links (/studio/data-catalog, ...).
    location /studio/ {
        try_files $uri $uri/ /studio/index.html;
    }
}
