{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.image.name }}-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- if eq .Values.accessAddress.scheme "https" }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    {{- else }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    {{- end }}
spec:
  {{- if .Values.ingress.ingressClass }}
  ingressClassName: {{ .Values.ingress.ingressClass }}
  {{- end }}
  rules:
    - http:
        paths:
          {{- /* studio adds /studio (plus, optionally, an Exact / below);
                 /api, /oauth2, /.well-known, /userinfo stay on the gateway
                 ingress that routes to bkn-safe. */}}
          - path: {{ .Values.ingress.path }}
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.image.name }}
                port:
                  number: {{ .Values.service.port }}
          {{- if .Values.ingress.rootRedirect }}
          {{- /* Exact / only — studio's nginx 302s it to /studio/. */}}
          - path: /
            pathType: Exact
            backend:
              service:
                name: {{ .Values.image.name }}
                port:
                  number: {{ .Values.service.port }}
          {{- end }}
{{- end }}
